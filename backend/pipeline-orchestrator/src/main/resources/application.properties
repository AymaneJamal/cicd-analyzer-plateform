# Application
spring.application.name=pipeline-orchestrator
server.port=5003

# Database PostgreSQL (Docker - Port 5438)
spring.datasource.url=jdbc:postgresql://localhost:5438/pipeline_optimizer
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Microservices URLs
microservices.jenkins-connector.url=http://localhost:5001
microservices.ai-analyzer.url=http://localhost:5002